name: Docker CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build amd64 + smoke test ──────────────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/kanade
          tags: |
            type=sha
            type=ref,event=branch

      - uses: docker/metadata-action@v6
        id: meta-web
        with:
          images: ${{ env.REGISTRY }}/kanade-web
          tags: |
            type=sha
            type=ref,event=branch

      - name: Build kanade (amd64 native)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          load: true
          tags: ghcr.io/petitstrawberry/kanade:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build kanade-web (amd64 native)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.web
          load: true
          tags: ghcr.io/petitstrawberry/kanade-web:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test - compose up
        run: |
          mkdir -p ./music
          docker compose up -d
          sleep 5

      - name: Smoke test - Web UI
        run: curl -sf --max-time 10 http://localhost:3000 | grep -q 'Kanade'

      - name: Smoke test - kanade server health
        run: |
          timeout 10s docker compose logs kanade | grep -q 'Kanade server listening'
          ! timeout 10s docker compose logs kanade | grep -q 'Media HTTP server listening on 0.0.0.0:8081'
          docker compose logs kanade

      - name: Logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ── Push per-platform (native runners) ────────────────────
  push:
    needs: build
    if: github.event_name == 'push'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (kanade)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch

      - name: Docker meta (kanade-web)
        id: meta-web
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web
          tags: |
            type=sha
            type=ref,event=branch

      - name: Push kanade (${{ matrix.suffix }})
        id: push-kanade
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,scope=${{ matrix.suffix }},mode=max

      - name: Push kanade-web (${{ matrix.suffix }})
        id: push-web
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.web
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web,push-by-digest=true,name-canonical=true
          cache-from: type=gha,scope=web-${{ matrix.suffix }}
          cache-to: type=gha,scope=web-${{ matrix.suffix }},mode=max

      - name: Export digest (kanade)
        run: |
          mkdir -p /tmp/digests/kanade
          digest="${{ steps.push-kanade.outputs.digest }}"
          touch "/tmp/digests/kanade/${digest#sha256:}"

      - name: Export digest (kanade-web)
        run: |
          mkdir -p /tmp/digests/kanade-web
          digest="${{ steps.push-web.outputs.digest }}"
          touch "/tmp/digests/kanade-web/${digest#sha256:}"

      - name: Upload digest (kanade)
        uses: actions/upload-artifact@v4
        with:
          name: digest-kanade-${{ matrix.suffix }}
          path: /tmp/digests/kanade/*
          if-no-files-found: error
          retention-days: 1

      - name: Upload digest (kanade-web)
        uses: actions/upload-artifact@v4
        with:
          name: digest-web-${{ matrix.suffix }}
          path: /tmp/digests/kanade-web/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    needs: push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (kanade)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch

      - name: Docker meta (kanade-web)
        id: meta-web
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web
          tags: |
            type=sha
            type=ref,event=branch

      - name: Download digests (kanade)
        uses: actions/download-artifact@v4
        with:
          pattern: digest-kanade-*
          path: /tmp/digests/kanade
          merge-multiple: true

      - name: Download digests (kanade-web)
        uses: actions/download-artifact@v4
        with:
          pattern: digest-web-*
          path: /tmp/digests/kanade-web
          merge-multiple: true

      - name: Create manifest list and push (kanade)
        working-directory: /tmp/digests/kanade
        env:
          KANADE_METADATA_JSON: ${{ steps.meta.outputs.json }}
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$KANADE_METADATA_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Create manifest list and push (kanade-web)
        working-directory: /tmp/digests/kanade-web
        env:
          KANADE_WEB_METADATA_JSON: ${{ steps.meta-web.outputs.json }}
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$KANADE_WEB_METADATA_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web@sha256:%s ' *)

      - name: Inspect image (kanade)
        run: docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

      - name: Inspect image (kanade-web)
        run: docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:${{ steps.meta-web.outputs.version }}
