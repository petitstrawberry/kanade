name: License Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - '**/Cargo.lock'
      - '**/Cargo.toml'
      - 'deny.toml'

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        checks:
          - advisories
          - licenses sources
    continue-on-error: ${{ matrix.checks == 'advisories' }}
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check ${{ matrix.checks }}
