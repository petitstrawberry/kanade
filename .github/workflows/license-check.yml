name: License Check
on:
  workflow_call:
    inputs:
      checks:
        description: "Space-separated cargo-deny checks to run"
        type: string
        default: "licenses sources"
jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check ${{ inputs.checks }}
