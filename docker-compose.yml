services:
  kanade:
    image: ghcr.io/petitstrawberry/kanade:main
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: kanade
    ports:
      - "${SERVER_PORT:-8080}:8080"
      - "${OH_PORT:-8090}:8090"
    environment:
      MUSIC_DIR: /music
      DB_PATH: /data/kanade.db
      BIND_ADDR: "0.0.0.0:8080"
      SERVER_HOST: "${SERVER_HOST:-}"
      OH_ADDR: "0.0.0.0:8090"
      SCAN_INTERVAL_SECS: "${SCAN_INTERVAL_SECS:-300}"
      RUST_LOG: "${RUST_LOG:-kanade=info,kanade_core=debug}"
      LASTFM_API_KEY: "${LASTFM_API_KEY:-}"
      LASTFM_SECRET: "${LASTFM_SECRET:-}"
      LASTFM_SESSION_KEY: "${LASTFM_SESSION_KEY:-}"
    volumes:
      - ${MUSIC_DIR:-./music}:/music:ro
      - kanade-data:/data
    restart: unless-stopped

  web:
    image: ghcr.io/petitstrawberry/kanade-web:main
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "${WEB_PORT:-3000}:80"
    restart: unless-stopped

  # Output node — connects to external MPD by default.
  # Use: docker compose --profile node up
  node:
    image: ghcr.io/petitstrawberry/kanade:main
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: kanade-node
    profiles:
      - node
    environment:
      NODE_NAME: "${NODE_NAME:-default}"
      SERVER_ADDR: "${SERVER_ADDR:-kanade:8080}"
      MPD_HOST: "${MPD_HOST:-host.docker.internal}"
      MPD_PORT: "${MPD_PORT:-6600}"
      RUST_LOG: "${NODE_RUST_LOG:-kanade_node=info}"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Containerized MPD — for development or when no host MPD is available.
  # Use: docker compose --profile mpd up
  mpd:
    image: giof71/mpd-alsa:latest
    profiles:
      - mpd
    ports:
      - "${MPD_PORT:-6600}:6600"
    volumes:
      - ${MUSIC_DIR:-./music}:/music:ro
      - mpd-data:/var/lib/mpd
      - ./docker/mpd.conf:/etc/mpd.conf:ro
    restart: unless-stopped

volumes:
  kanade-data:
  mpd-data:
